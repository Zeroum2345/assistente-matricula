# docker-compose.yml — Assistente de Matrícula UFCG
#
# Serviços:
#   ollama       — servidor LLM local
#   ollama-pull  — baixa o modelo uma vez e sai
#   ingest       — indexa documentos e sai
#   agent        — interface Streamlit
#
# Uso recomendado (passo a passo):
#   docker compose up ollama -d
#   docker compose run --rm ollama-pull
#   docker compose run --rm ingest
#   docker compose up agent
#
# Uso completo (automático):
#   docker compose up

version: "3.9"

services:

  # ---------------------------------------------------------------------------
  # Ollama — servidor LLM local
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ufcg-ollama
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=10m
      # Limita paralelismo para economizar RAM em CPU
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
    # Healthcheck generoso: Ollama demora ~30s para subir em CPU
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15          # até 150s de espera total
      start_period: 60s    # não conta falhas nos primeiros 60s

  # ---------------------------------------------------------------------------
  # Pull do modelo (roda uma vez, sai após o pull)
  # Com 3.8 GiB RAM: use qwen2.5:3b (2.0 GB) em vez de 7b (4.7 GB)
  # ---------------------------------------------------------------------------
  ollama-pull:
    image: ollama/ollama:latest
    container_name: ufcg-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "
        echo '=== Verificando modelo disponível ===' &&
        ollama list &&
        echo '=== Baixando qwen2.5:3b (2 GB — compatível com 3.8 GiB RAM) ===' &&
        ollama pull qwen2.5:3b &&
        echo '=== Modelo pronto. ==='
      "
    volumes:
      - ollama_models:/root/.ollama
    restart: "no"

  # ---------------------------------------------------------------------------
  # Ingest — indexa os documentos em data/raw/ e sai
  # Não depende do Ollama (só usa embeddings HuggingFace locais)
  # ---------------------------------------------------------------------------
  ingest:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: ufcg-ingest
    # Ingest NÃO depende do Ollama — só usa embeddings locais (HuggingFace)
    # Remova o depends_on abaixo se quiser rodar ingest em paralelo com o pull
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      # Cache do HuggingFace persistido para não baixar o modelo a cada run
      - hf_cache:/root/.cache/huggingface
    environment:
      - PYTHONPATH=/app
      - FAISS_INDEX_PATH=/app/data/faiss_index
      - RAW_DIR=/app/data/raw
      # Modelo leve compatível com pouca RAM
      - EMBEDDING_MODEL=sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
    entrypoint: ["python", "ingest/indexer.py", "--reset"]
    restart: "no"

  # ---------------------------------------------------------------------------
  # Agent — interface Streamlit principal
  # ---------------------------------------------------------------------------
  agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: ufcg-agent
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./src:/app/src
      - ./app:/app/app 
      - hf_cache:/root/.cache/huggingface
    ports:
      - "8501:8501"
    environment:
      - PYTHONPATH=/app
      - OLLAMA_BASE_URL=http://ollama:11434
      - FAISS_INDEX_PATH=/app/data/faiss_index
      - RAW_DIR=/app/data/raw
      - EMBEDDING_MODEL=sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
      - MCP_AUDIT_LOG=/app/logs/mcp_audit.jsonl
      - MCP_EURECA_AUDIT_LOG=/app/logs/mcp_eureca_audit.jsonl
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      # Desabilita watcher para evitar double-load do modelo de embeddings
      - STREAMLIT_SERVER_FILE_WATCHER_TYPE=none
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8501/_stcore/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s   # bge-m3/MiniLM demora para carregar na 1ª vez

  # ---------------------------------------------------------------------------
  # Eval — avaliação RAGAS (uso opcional, ativado com --profile eval)
  # ---------------------------------------------------------------------------
  eval:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: ufcg-eval
    depends_on:
      agent:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./eval:/app/eval
      - ./logs:/app/logs 
      - hf_cache:/root/.cache/huggingface
    environment:
      - PYTHONPATH=/app
      - OLLAMA_BASE_URL=http://ollama:11434
      - FAISS_INDEX_PATH=/app/data/faiss_index
      - EMBEDDING_MODEL=sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
    entrypoint: ["python", "eval/run_ragas.py", "--output", "eval/results.json"]
    restart: "no"
    profiles:
      - eval

volumes:
  ollama_models:   # modelos Ollama persistidos entre restarts
  hf_cache:        # cache HuggingFace — evita baixar embeddings a cada build